apiVersion: v1
kind: Service
metadata:
  name: bomber-app-headless
spec:
  clusterIP: None
  selector:
    app: bomber-app
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: bomber-app
spec:
  selector:
    app: bomber-app
  ports:
    - name: http
      port: 80
      targetPort: 3000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: bomber-app
spec:
  serviceName: bomber-app-headless
  replicas: 1
  selector:
    matchLabels:
      app: bomber-app
  template:
    metadata:
      labels:
        app: bomber-app
    spec:
      automountServiceAccountToken: false
      containers:
        - name: app
          image: your-registry/b2-bomber:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: DATA_DIR
              value: /app/data
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: bomber-secret
                  key: SESSION_SECRET
          volumeMounts:
            - name: app-data
              mountPath: /app/data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 200Mi
            limits:
              cpu: 500m
              memory: 512Mi
              ephemeral-storage: 1Gi
          readinessProbe:
            httpGet:
              path: /api/leaderboard
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/leaderboard
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
  volumeClaimTemplates:
    - metadata:
        name: app-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 2Gi
