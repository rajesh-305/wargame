version: "3.9"

services:
  app:
    image: ${IMAGE}
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATA_DIR=/app/data
      - SESSION_SECRET=${SESSION_SECRET}
    volumes:
      - app-data:/app/data
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

volumes:
  app-data:
